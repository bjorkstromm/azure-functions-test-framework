name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test (Worker SDK 2.x / .NET 9)
        run: dotnet test tests/Sample.FunctionApp.Worker.Tests --no-build --configuration Release --verbosity normal

      - name: Test WAF (Worker SDK 2.x / .NET 9)
        run: dotnet test tests/Sample.FunctionApp.Worker.WAF.Tests --no-build --configuration Release --verbosity normal
