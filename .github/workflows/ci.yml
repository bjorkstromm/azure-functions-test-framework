name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore framework
        run: dotnet restore AzureFunctions.TestFramework.slnx

      - name: Restore samples
        run: dotnet restore Samples.slnx

      - name: Build framework
        run: dotnet build AzureFunctions.TestFramework.slnx --no-restore --configuration Release

      - name: Build samples
        run: dotnet build Samples.slnx --no-restore --configuration Release

      - name: Test framework (with coverage)
        run: >
          dotnet test AzureFunctions.TestFramework.slnx
          --no-build --configuration Release --verbosity normal
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          "/p:Include=[AzureFunctions.TestFramework.*]*"

      - name: Test samples
        run: dotnet test Samples.slnx --no-build --configuration Release --verbosity normal

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Merge coverage reports
        run: reportgenerator -reports:"tests/**/coverage.cobertura.xml" -targetdir:"./coverage" -reporttypes:"Cobertura"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: ./coverage/Cobertura.xml
          retention-days: 7

      - name: Pack
        run: dotnet pack AzureFunctions.TestFramework.slnx --no-build --configuration Release --output ./artifacts

  coverage-comment:
    if: github.event_name == 'pull_request'
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: ./coverage

      - name: Post coverage summary as PR comment
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: ./coverage/Cobertura.xml
          badge: true
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both
          thresholds: '60 80'

      - name: Add coverage comment to PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          path: code-coverage-results.md

  coverage-pages:
    if: github.ref == 'refs/heads/main'
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: ./coverage

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate HTML coverage report
        run: reportgenerator -reports:"./coverage/Cobertura.xml" -targetdir:"./coverage-html" -reporttypes:"HtmlInline_AzurePipelines"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./coverage-html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
